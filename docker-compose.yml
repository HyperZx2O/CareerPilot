services:
  # ── Backend API ──────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      - ENV=production
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ── Celery Background Worker ─────────────────────────────────────
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A backend.workers.celery_app worker --loglevel=info --concurrency=4
    env_file:
      - .env
    environment:
      - ENV=production
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      - redis
    restart: unless-stopped

  # ── Redis (Celery broker + cache) ────────────────────────────────
  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  # ── Frontend (Next.js) ───────────────────────────────────────────
  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
    depends_on:
      - backend
    restart: unless-stopped

  # ── SSL Reverse Proxy ────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  # ── Let's Encrypt Certbot (auto-provisions SSL certs) ────────────
  certbot:
    image: certbot/certbot:v2.9.0
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: >
      sh -c "
      if [ ! -f /etc/letsencrypt/live/$$DOMAIN/fullchain.pem ]; then
        certbot certonly --webroot -w /var/www/certbot
          -d $$DOMAIN
          --email $$EMAIL
          --agree-tos
          --non-interactive
          || true;
      fi &&
      while true; do
        certbot renew --webroot -w /var/www/certbot --quiet && nginx -s reload || true;
        sleep 86400;
      done
      "
    environment:
      - DOMAIN=${DOMAIN:-careerpilot.example.com}
      - EMAIL=${SSL_EMAIL:-admin@example.com}
    depends_on:
      - nginx
    restart: unless-stopped

  # ── Database Backup (daily) ──────────────────────────────────────
  backup:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      sh -c "
      while true; do
        python scripts/backup_db.py --output /backups/backup_\$$(date +%Y-%m-%d).sql;
        sleep 86400;
      done
      "
    env_file:
      - .env
    volumes:
      - db_backups:/backups
    depends_on:
      - backend
    restart: unless-stopped

  # ── Monitoring ───────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    expose:
      - "9090"
    depends_on:
      - backend
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.0
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:?GRAFANA_PASSWORD must be set in .env}
      - GF_INSTALL_PLUGINS=
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  redis_data:
  certbot_certs:
  certbot_www:
  db_backups:
  prometheus_data:
  grafana_data:
